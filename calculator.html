<doctype!>
    <html>
        <head>
            <title>Interactive calculator</title>
            <link rel="stylesheet" href="calculator.css">
        </head>
        <body>
        <div class="calculator">
            <div class="Brand">CASIO 991ES</div>
            <div class="displaynum">0
            </div>
        <div class="buttons">
            <button class="non-operator">AC</button>
            <button class="non-operator">DEL</button>
            <button class="non-operator">%</button>
            <button class="operator">/</button>


            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>


            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>


            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="operatorequals">=</button>
        </div>
    </div>     
        </body>
    </html>
